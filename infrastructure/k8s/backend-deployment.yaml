apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: promptcorp
  labels:
    app: promptcorp-backend
    tier: backend
    environment: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: promptcorp-backend
  template:
    metadata:
      labels:
        app: promptcorp-backend
        tier: backend
        environment: production
    spec:
      containers:
        - name: promptcorp-backend
          image: ${REGISTRY}/promptcorp-backend:latest
          ports:
            - containerPort: 4000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: promptcorp-config
            - secretRef:
                name: promptcorp-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
