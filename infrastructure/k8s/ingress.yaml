apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: promptcorp-ingress
  namespace: promptcorp
  labels:
    app: promptcorp-os
    environment: production
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - promptcorp.example.com
      secretName: promptcorp-tls
  rules:
    - host: promptcorp.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 4000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 3000
