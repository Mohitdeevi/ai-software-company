apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: promptcorp
  labels:
    app: promptcorp-frontend
    tier: frontend
    environment: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: promptcorp-frontend
  template:
    metadata:
      labels:
        app: promptcorp-frontend
        tier: frontend
        environment: production
    spec:
      containers:
        - name: promptcorp-frontend
          image: ${REGISTRY}/promptcorp-frontend:latest
          ports:
            - containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: promptcorp-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
