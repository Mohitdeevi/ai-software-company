apiVersion: v1
kind: Secret
metadata:
  name: promptcorp-secrets
  namespace: promptcorp
  labels:
    app: promptcorp-os
    environment: production
type: Opaque
data:
  # Replace these base64-encoded placeholder values with your actual secrets.
  # To encode a value: echo -n "your-value" | base64
  #
  # JWT_SECRET: Secret key used to sign access tokens
  JWT_SECRET: REPLACE_WITH_BASE64_ENCODED_VALUE
  # JWT_REFRESH_SECRET: Secret key used to sign refresh tokens
  JWT_REFRESH_SECRET: REPLACE_WITH_BASE64_ENCODED_VALUE
  # LLM_API_KEY: Anthropic API key for Claude access
  LLM_API_KEY: REPLACE_WITH_BASE64_ENCODED_VALUE
  # GITHUB_CLIENT_ID: OAuth App client ID from GitHub
  GITHUB_CLIENT_ID: REPLACE_WITH_BASE64_ENCODED_VALUE
  # GITHUB_CLIENT_SECRET: OAuth App client secret from GitHub
  GITHUB_CLIENT_SECRET: REPLACE_WITH_BASE64_ENCODED_VALUE
